name: homesurge_mobile
description: Homesurge mobile app for Kenya housing discovery
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.9.0
  go_router: ^17.3.0
  flutter_riverpod: ^3.3.2
  flutter_dotenv: ^6.0.1
  cached_network_image: ^3.4.1
  google_fonts: ^8.1.0
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^13.2.0
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  shared_preferences: ^2.5.3
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env